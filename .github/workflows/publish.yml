name: Publish Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Checkout
        # v4.2.2 SHA
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install uv
        # uses: astral-sh/setup-uv@v5 v5.2.1
        uses: astral-sh/setup-uv@b5f58b2abc5763ade55e4e9d0fe52cd1ff7979ca
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --frozen --no-build --extra build

      - name: Build Executable and Rename
        run: |
          uv run pyinstaller --clean AsdSte100Lookup.spec
          OS=$(uname -s | tr '[:upper:]' '[:lower:]')
          ARCH=$(uname -m)
          VERSION=${{ github.ref_name }}
          
          mv dist/AsdSte100Lookup dist/AsdSte100Lookup-${VERSION}-${OS}-${ARCH}

      - name: Upload binaries to Release
        run: |
          VERSION=${{ github.ref_name }}

          gh release create ${VERSION} --title "${VERSION}" --generate-notes || true
          gh release upload ${VERSION} dist/AsdSte100Lookup-${VERSION}-* --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
