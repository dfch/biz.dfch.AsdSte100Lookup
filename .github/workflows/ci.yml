name: Pylint and unittest

on: [push, pull_request]

jobs:
  build:
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
    # - uses: actions/checkout@v5
    - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
    - name: Set up Python ${{ matrix.python-version }}
      # uses: actions/setup-python@v6
      uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install uv
      run: |
        python -m pip install uv==0.11.17
    - name: Install dependencies
      run: |
        uv sync --frozen --python "${{ matrix.python-version }}" --extra dev --extra build
    - name: Analyzing the code with pylint
      run: |
        uv run pylint $(git ls-files '*.py') || true
    - name: Run unit tests
      run: |
        uv run python -m unittest discover -v -s tests -t . -p "test_*.py"
